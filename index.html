<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen p-6">
    <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">Pokédex</h1>

    <!-- Buscador -->
    <div class="max-w-md mx-auto flex gap-2 mb-6">
      <input
        id="buscador"
        type="text"
        placeholder="Busca un Pokémon (ej. charizard)"
        class="flex-1 p-2 rounded-lg border border-slate-300"
      />
      <button
        id="btn-buscar"
        class="px-4 py-2 bg-yellow-400 font-semibold rounded-lg hover:bg-yellow-500 cursor-pointer"
      >
        Buscar
      </button>
    </div>

    <!-- ⚙️ ZONAS DE ESTADO: Spinner Animado y Mensaje con Reintentar -->
    <div
      id="spinner"
      class="hidden flex flex-col items-center justify-center my-6 gap-2"
    >
      <div
        class="w-8 h-8 border-4 border-slate-200 border-t-yellow-400 rounded-full animate-spin"
      ></div>
      <p class="text-xs font-medium text-slate-500">Cargando...</p>
    </div>

    <div id="mensaje" class="hidden text-center my-4 space-y-2">
      <p id="mensaje-texto" class="text-red-600 font-medium"></p>
      <button
        id="btn-reintentar"
        class="hidden px-3 py-1 bg-red-100 hover:bg-red-200 text-red-700 text-xs font-semibold rounded-lg transition-colors cursor-pointer"
      >
        🔄 Reintentar
      </button>
    </div>

    <!-- Rejilla de Resultados -->
    <div
      id="resultado"
      class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto"
    ></div>

    <div class="text-center my-6">
      <button
        id="cargar-mas"
        class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800 cursor-pointer transition-colors"
      >
        Cargar más
      </button>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
