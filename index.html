<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen p-6">
    <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">Pokédex</h1>

    <!-- Aquí el JS pintará las tarjetas. Empieza vacío. -->
    <div
      id="resultado"
      class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto"
    >
      <article class="bg-white rounded-xl shadow p-4 text-center">
        <img
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
          alt="pikachu"
          class="w-24 h-24 mx-auto"
        />
        <h2 class="capitalize font-bold text-slate-800 mt-2">pikachu</h2>
        <div class="flex gap-1 justify-center mt-2">
          <span
            class="text-xs bg-slate-200 text-slate-700 px-2 py-1 rounded-full"
            >electric</span
          >
        </div>
      </article>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
